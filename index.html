<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiroKaizen - Site em Construção</title>
    <style>
        /* Reset padrão */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9; /* Fundo claro combinando com a ilustração */
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container Principal */
        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 1s ease-out;
        }

        /* Logo GiroKaizen */
        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            max-width: 280px;
            width: 100%;
            height: auto;
        }

        /* Ilustração de Construção */
        .illustration-container {
            margin: 20px 0;
            position: relative;
        }

        .illustration {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* Textos */
        h1 {
            font-size: 2.2rem;
            color: #0c437a; /* Azul escuro inspirado na logo */
            margin-top: 15px;
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            color: #666666;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Animação de Entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsividade para celulares */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }
            h1 {
                font-size: 1.7rem;
            }
            p {
                font-size: 1rem;
            }
            .logo {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Principal -->
        

        <!-- Ilustração baseada na imagem de referência -->
        <div class="illustration-container">
            <!-- Caso você use a imagem gerada, salve-a como "construcao.png" e altere abaixo -->
            <img src="em_construcao.png" alt="Ilustração de Site em Construção" class="illustration">
        </div>

        <!-- Mensagem -->
        <h1>Estamos em evolução.</h1>
        <p>O novo portal <strong>GiroKaizen</strong> está chegando para oferecer uma plataforma ainda mais rápida, robusta e focada em acelerar os seus resultados. Volte em breve!</p>
    </div>

</body>
</html>
